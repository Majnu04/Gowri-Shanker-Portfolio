    <style>
      /* Mobile UX Improvements */
      html {
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
        scroll-behavior: smooth;
      }
      
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      * {
        box-sizing: border-box;
      }
      
      /* Prevent horizontal scroll */
      #root {
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      /* Touch improvements */
      button, a, [role="button"] {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      
      /* Smooth scrolling for mobile */
      @media (max-width: 768px) {
        html {
          scroll-behavior: smooth;
        }
        
        body {
          font-size: 16px; /* Prevent zoom on iOS */
        }
        
        /* Fix navigation layout on mobile */
        nav > div > div {
          display: flex !important;
          justify-content: space-between !important;
          align-items: center !important;
          width: 100% !important;
        }
        
        /* Ensure Portfolio logo stays on left */
        nav > div > div > div:first-child {
          flex-shrink: 0 !important;
          margin-right: auto !important;
        }
        
        /* Ensure menu button stays on right */
        nav > div > div > button {
          flex-shrink: 0 !important;
          margin-left: auto !important;
        }
        
        /* Prevent Projects section overflow */
        #projects {
          overflow-x: hidden !important;
        }
        
        /* Ensure all sections don't cause horizontal scroll */
        section {
          max-width: 100vw !important;
          overflow-x: hidden !important;
        }
      }
    </style>
  </head>
